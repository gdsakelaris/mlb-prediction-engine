[pytest]
testpaths = Tests
addopts = -m "not slow" -q
markers =
    slow: needs full Model/artifacts + stores; run explicitly with `pytest -m slow`
# warning ratchet (2026-07-23): the suite is warning-clean after the
# cupyx.scatter_add fix — any NEW warning is now a failure, so silent
# deprecations can never pile up to 5,500 again. Add narrow per-warning
# ignores here only as third-party libs force them, each with a comment.
filterwarnings =
    error
